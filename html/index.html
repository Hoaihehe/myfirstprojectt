<!DOCTYPE html>
<html lang="vi">
<head>
    <title>Danh sách sản phẩm</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Nhúng file lib.js chứa mảng productList và hàm addProduct của bạn -->
    <script src="../js/lib.js"></script>

    <!-- Đã sửa lại link CDN Bootstrap bản ổn định -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <div class="container mt-4">
        <nav>
        <a href="index.html" class="text-decoration-none">Trang chủ</a> / <span>Chi tiết sản phẩm</span>
    </nav>
        <h2 class="text-center mb-4">Danh sách Hải sản</h2>
        
        <!-- ĐÃ SỬA LỖI Ở DÒNG NÀY: Tách riêng id và đưa các class grid của bootstrap vào thuộc tính class -->
        <div id="product-list" class="product-list row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            <!-- Các sản phẩm sẽ được Javascript in ra tại đây -->
        </div>
    </div>

    <!-- Script gọi dữ liệu -->
    <script>
        // Kiểm tra xem mảng và hàm có tồn tại không trước khi chạy
        if (typeof productList !== 'undefined' && typeof addProduct === 'function') {
            productList.forEach(function(item) {
                addProduct(item.id, item.name, item.price, item.image, item.productlink);
            });
        } else {
            console.error("Không tìm thấy dữ liệu productList hoặc hàm addProduct trong file lib.js");
        }
    </script>
</body>
</html>
