<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script> 
    <script src="../js/lib.js"></script>

    <style>
        /* Ẩn mũi tên tăng giảm mặc định của ô nhập số mặc định trên trình duyệt */
        #qty-input::-webkit-outer-spin-button,
        #qty-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        #qty-input {
            -moz-appearance: textfield;
        }
    </style>
</head>
<body>

<div class="container mt-4">
    <nav>
        <a href="index.html" class="text-decoration-none">Trang chủ</a> / <span>Chi tiết sản phẩm</span>
    </nav>

    <hr> <div class="row mt-4">
        <div class="col-md-5">
            <img src="https://placeholder.com" id="img-detail" class="img-fluid border" alt="Ảnh sản phẩm">
        </div>

        <div class="col-md-7">
            <h2 id="name-detail" class="fw-bold">Tên sản phẩm</h2>
            <h4 id="price-detail" class="text-danger my-3">Giá: 0đ</h4>
            <p class="fw-bold mb-1">Mô tả sản phẩm:</p>
            <p id="desc-detail" class="text-secondary" style="text-align: justify;">
                Nội dung mô tả sẽ hiển thị tại đây...
            </p>
            
            <div class="d-flex align-items-center mt-3 mb-3">
                <span class="fw-bold me-3">Số lượng:</span>
                <div class="input-group" style="width: 130px;">
                    <button class="btn btn-outline-secondary" type="button" onclick="changeQty(-1)">-</button>
                    <input type="number" id="qty-input" class="form-control text-center" value="1" min="1">
                    <button class="btn btn-outline-secondary" type="button" onclick="changeQty(1)">+</button>
                </div>
            </div>
            
            <button id="add-to-cart-btn" class="btn btn-primary">Thêm vào giỏ hàng</button>

<div id="success-msg" class="text-success mt-2 fw-bold" style="display: none;">
    Thêm giỏ hàng thành công!
</div>
        </div>
    </div>
</div>

<script>
    // 2. Sử dụng URLSearchParams để lấy ID từ thanh địa chỉ (URL)
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);
    const productId = urlParams.get('id'); // Kết quả: "01" hoặc "02"...

    // 3. Tìm sản phẩm trong mảng dựa trên ID vừa lấy được
    const product = productList.find(item => item.id === productId);

    // 4. Nếu tìm thấy sản phẩm thì đổ dữ liệu ra HTML
    if (product) {
        document.getElementById('name-detail').innerText = product.name;
        document.getElementById('price-detail').innerText = "Giá: " + product.price;
        document.getElementById('desc-detail').innerText = product.desc;
        document.getElementById('img-detail').src = product.image;
    } else {
        // Trường hợp ID không tồn tại hoặc không tìm thấy
        document.body.innerHTML = "<div class='container mt-5'><h3>Không tìm thấy sản phẩm này!</h3><a href='../index.html'>Quay lại trang chủ</a></div>";
    }

    // 5. Hàm xử lý tăng/giảm số lượng
    function changeQty(amount) {
        const qtyInput = document.getElementById('qty-input');
        // Lấy giá trị hiện tại, nếu trống thì mặc định là 1
        let currentVal = parseInt(qtyInput.value) || 1;
        
        // Cộng hoặc trừ số lượng
        let newVal = currentVal + amount;
        
        // Đảm bảo số lượng không nhỏ hơn 1
        if (newVal < 1) {
            newVal = 1;
        }
        
        // Gán lại giá trị mới vào ô input
        qtyInput.value = newVal;
        
    }
    // Hàm xử lý khi click nút "Thêm vào giỏ hàng"
document.getElementById('add-to-cart-btn').addEventListener('click', function() {
    const msgElement = document.getElementById('success-msg');
    
    // Hiển thị thông báo
    msgElement.style.display = 'block';

    // (Tùy chọn) Tự động ẩn thông báo sau 3 giây
    setTimeout(() => {
        msgElement.style.display = 'none';
    }, 3000);
});
</script>

</body>
</html>
